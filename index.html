<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Открытка</title>
<style>
html,body{
  margin:0;
  height:100%;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(circle at 50% 35%, rgba(255,214,160,.09), transparent 32%),
    radial-gradient(circle at 50% 65%, rgba(130,90,40,.16), transparent 52%),
    linear-gradient(180deg, #0a0c10 0%, #05070d 100%);
  overflow:hidden;
  touch-action:none;
  user-select:none;
  font-family:Arial,sans-serif;
  position:relative;
}

#floatLayer{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:9999;
}

#wrap{
  display:flex;
  align-items:center;
  gap:34px;
  position:relative;
  z-index:2;
  padding:24px 28px 24px 32px;
  border-radius:28px;
  background:
    linear-gradient(180deg, rgba(92,59,29,.92), rgba(40,24,12,.95));
  border:1px solid rgba(255,229,198,.18);
  box-shadow:
    0 26px 80px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.08),
    inset 0 -1px 0 rgba(0,0,0,.4);
}

#wrap::before{
  content:'';
  position:absolute;
  inset:10px;
  border-radius:22px;
  border:1px solid rgba(255,230,195,.12);
  pointer-events:none;
}

#wrap::after{
  content:'';
  position:absolute;
  left:18px;
  right:18px;
  bottom:16px;
  height:14px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.07), rgba(0,0,0,.18));
  filter:blur(.2px);
  pointer-events:none;
}

#playerShell{
  position:relative;
  width:560px;
  height:340px;
  border-radius:28px;
  background:
    radial-gradient(circle at 18% 22%, rgba(255,255,255,.12), transparent 18%),
    linear-gradient(145deg, rgba(111,69,34,.98), rgba(41,24,13,.98));
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,.08),
    inset 0 -18px 40px rgba(0,0,0,.4),
    0 18px 50px rgba(0,0,0,.35);
  border:1px solid rgba(255,230,195,.10);
  display:flex;
  align-items:center;
  justify-content:flex-start;
  padding:20px 24px;
}

#playerShell::before{
  content:'';
  position:absolute;
  inset:14px;
  border-radius:20px;
  border:1px solid rgba(255,238,215,.08);
  pointer-events:none;
}

#playerShell::after{
  content:'';
  position:absolute;
  left:26px;
  right:26px;
  top:20px;
  height:3px;
  border-radius:999px;
  background:linear-gradient(90deg, transparent, rgba(255,232,200,.32), transparent);
}

#knobBox{
  width:148px;
  height:148px;
  position:absolute;
  right:24px;
  top:50%;
  transform:translateY(-50%);
  border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,.09), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(0,0,0,.2), rgba(0,0,0,.55));
  border:1px solid rgba(255,232,205,.11);
  box-shadow:
    inset 0 0 0 10px rgba(0,0,0,.14),
    0 10px 30px rgba(0,0,0,.34);
  display:flex;
  align-items:center;
  justify-content:center;
}

#knobBox::before{
  content:'';
  position:absolute;
  inset:11px;
  border-radius:50%;
  border:1px solid rgba(255,236,216,.08);
}

#knob{
  width:94px;
  height:94px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, #9fb2d6 0 13%, #60779d 14% 20%, #27344f 21% 100%);
  cursor:grab;
  touch-action:none;
  transform:rotate(0deg);
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.12),
    inset 0 -10px 20px rgba(0,0,0,.35),
    0 8px 20px rgba(0,0,0,.35);
  position:relative;
}
#knob::before{
  content:'';
  position:absolute;
  inset:14px;
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,255,255,.22), rgba(255,255,255,0) 55%);
}
#knob:active{
  cursor:grabbing;
}

#recordArea{
  width:330px;
  height:330px;
  position:relative;
  flex:0 0 auto;
  border-radius:50%;
  background:
    radial-gradient(circle at 50% 50%, rgba(15,15,15,.5) 0 7%, rgba(0,0,0,.95) 8% 11%, rgba(15,15,15,.88) 12% 100%);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 0 14px rgba(0,0,0,.22),
    0 16px 40px rgba(0,0,0,.34);
  display:flex;
  align-items:center;
  justify-content:center;
}

#record{
  width:312px;
  height:312px;
  border-radius:50%;
  object-fit:cover;
  transform:rotate(0deg);
  box-shadow:
    inset 0 0 0 2px rgba(255,255,255,.08),
    inset 0 0 40px rgba(0,0,0,.45),
    0 8px 22px rgba(0,0,0,.3);
}

#recordArea::before{
  content:'';
  position:absolute;
  inset:34px;
  border-radius:50%;
  background:
    repeating-radial-gradient(circle at center,
      rgba(255,255,255,.00) 0 7px,
      rgba(255,255,255,.03) 7px 8px);
  pointer-events:none;
}

#recordArea::after{
  content:'';
  position:absolute;
  width:32px;
  height:32px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 30%, #dfe7f6 0 8%, #7d8faa 9% 22%, #2b3447 23% 100%);
  box-shadow:
    inset 0 1px 6px rgba(255,255,255,.18),
    0 0 0 2px rgba(0,0,0,.3);
  pointer-events:none;
}

#voice{
  display:none;
}

.float-item{
  position:fixed;
  left:0;
  top:0;
  border-radius:18px;
  opacity:0;
  transform:translate(0, 0) scale(0.92);
  transition:
    transform 12s linear,
    opacity 2s ease-in-out;
  will-change:transform, opacity;
  z-index:10000;
  box-shadow:0 14px 40px rgba(0,0,0,.32);
  overflow:hidden;
  font-family:Arial,sans-serif;
  display:block;
  object-fit:contain;
  background:#000;
}

.float-item.video{
  background:#000;
  outline:1px solid rgba(255,255,255,.06);
}
</style>
</head>
<body>

<div id="floatLayer"></div>

<div id="wrap">
  <div id="playerShell">
    <div id="recordArea">
      <img id="record" src="plastica.png" alt="">
    </div>
    <div id="knobBox">
      <div id="knob"></div>
    </div>
  </div>
</div>

<audio id="voice" src="voice.mp3" preload="auto"></audio>

<script>
const knob = document.getElementById('knob');
const record = document.getElementById('record');
const voice = document.getElementById('voice');
const floatLayer = document.getElementById('floatLayer');
const playerShell = document.getElementById('playerShell');
const wrap = document.getElementById('wrap');

let dragging = false;
let lastAngle = 0;
let rotation = 0;
let started = false;
let stopTimer = null;
let speedSmooth = 0;
let floatCooldown = 0;
let mediaCursor = 0;
let burstTimer = null;
let burstEndAt = 0;
let burstStarted = false;

const BURST_MS = 90_000;
const BURST_INTERVAL_MS = 650;

const mediaPool = [
  { src: '2_5357332348633383173_1.mp4', type: 'video' },
  { src: '20241110_201422.jpg', type: 'image' },
  { src: '20241221_182206.jpg', type: 'image' },
  { src: '20241222_022742.mp4', type: 'video' },
  { src: '20250323_155013.png', type: 'image' },
  { src: '20250703_204505.jpg', type: 'image' },
  { src: '20250819_180033.jpg', type: 'image' },
  { src: '20260519_183549.mp4', type: 'video' },
  { src: 'IMG_20250309_012330_472.jpg', type: 'image' },
  { src: 'IMG_20250429_014246_344.jpg', type: 'image' },
  { src: 'IMG_20251026_213234_852.jpg', type: 'image' },
  { src: 'IMG_20260122_164139_247.jpg', type: 'image' },
  { src: 'TBcLekUZXTIkRP7XpnZV1_7aTaBoj1V5Fa1bisdLGZA_CDzFPIC8T04Cowry1wM.jpg', type: 'image' },
  { src: 'VideoCapture_20241125-110959.jpg', type: 'image' },
  { src: 'VideoCapture_20250105-045240.jpg', type: 'image' },
  { src: 'VideoCapture_20250702-120213.jpg', type: 'image' },
  { src: 'video (6).mp4', type: 'video' },
  { src: 'Screen_Recording_20250128_050644_Chrome.mp4', type: 'video' }
];

const activeItems = [];
const MAX_VISIBLE_ITEMS = 6;

function centerOf(el) {
  const r = el.getBoundingClientRect();
  return { x: r.left + r.width / 2, y: r.top + r.height / 2 };
}

function angleFromCenter(e, el) {
  const c = centerOf(el);
  return Math.atan2(e.clientY - c.y, e.clientX - c.x) * 180 / Math.PI;
}

function fixDelta(d) {
  if (d > 180) return d - 360;
  if (d < -180) return d + 360;
  return d;
}

function clamp(n, min, max) {
  return Math.max(min, Math.min(max, n));
}

function rand(min, max) {
  return min + Math.random() * (max - min);
}

async function ensurePlaying() {
  if (!started || voice.paused) {
    started = true;
    try {
      await voice.play();
    } catch {}
  }
}

function scheduleStop() {
  clearTimeout(stopTimer);
  stopTimer = setTimeout(() => {
    voice.pause();
    voice.playbackRate = 1;
    started = false;
    speedSmooth = 0;
  }, 60);
}

function cleanupActiveItems() {
  const now = performance.now();
  for (let i = activeItems.length - 1; i >= 0; i--) {
    if (now > activeItems[i].until) activeItems.splice(i, 1);
  }
}

function isFreeSpot(x, y, w, h) {
  cleanupActiveItems();
  const cx = x + w / 2;
  const cy = y + h / 2;

  for (const item of activeItems) {
    const dx = cx - item.cx;
    const dy = cy - item.cy;
    const dist = Math.hypot(dx, dy);
    const minDist = (Math.max(w, h) + item.size) * 0.70;
    if (dist < minDist) return false;
  }
  return true;
}

function sideSpots(mediaW, mediaH) {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const shell = playerShell.getBoundingClientRect();
  const gap = 18;
  const pad = 22;
  const topMin = clamp(shell.top + 8, pad, vh - mediaH - pad);
  const topMax = clamp(shell.bottom - mediaH - 8, pad, vh - mediaH - pad);
  const y = clamp(rand(topMin, topMax), pad, Math.max(pad, vh - mediaH - pad));

  const leftMinX = pad;
  const leftMaxX = Math.max(pad, shell.left - mediaW - gap);
  const rightMinX = Math.min(vw - mediaW - pad, shell.right + gap);
  const rightMaxX = Math.max(rightMinX, vw - mediaW - pad);

  const side = Math.random() < 0.5 ? 'left' : 'right';
  const x = side === 'left'
    ? clamp(rand(leftMinX, leftMaxX), pad, Math.max(pad, leftMaxX))
    : clamp(rand(rightMinX, rightMaxX), rightMinX, rightMaxX);

  return { x, y };
}

function nextMedia() {
  const item = mediaPool[mediaCursor];
  mediaCursor = (mediaCursor + 1) % mediaPool.length;
  return item;
}

function spawnFloatingMedia() {
  cleanupActiveItems();
  if (activeItems.length >= MAX_VISIBLE_ITEMS) return;

  const pick = nextMedia();
  if (!pick || !pick.src) return;

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const base = Math.min(vw, vh) * 0.22;
  const mediaW = clamp(base + rand(40, 150), 180, 340);
  const mediaH = clamp(mediaW * rand(0.68, 0.88), 150, 300);
  const start = sideSpots(mediaW, mediaH);

  const end = sideSpots(mediaW, mediaH);
  const isVideo = pick.type === 'video';
  const el = document.createElement(isVideo ? 'video' : 'img');
  el.className = 'float-item' + (isVideo ? ' video' : '');
  el.src = pick.src;
  el.style.width = `${mediaW}px`;
  el.style.height = `${mediaH}px`;
  el.style.left = `${start.x}px`;
  el.style.top = `${start.y}px`;
  el.style.zIndex = '10000';
  el.style.objectFit = 'cover';

  if (isVideo) {
    el.muted = true;
    el.loop = true;
    el.playsInline = true;
    el.autoplay = true;
    el.preload = 'auto';
  }

  const travelX = end.x - start.x;
  const travelY = end.y - start.y;
  const scale = 0.98 + Math.random() * 0.14;
  const duration = 7000 + Math.random() * 3000;

  el.style.transition = `transform ${duration}ms linear, opacity 1800ms ease-in-out`;
  floatLayer.appendChild(el);

  if (isVideo) {
    el.play().catch(() => {});
  }

  activeItems.push({
    cx: start.x + mediaW / 2,
    cy: start.y + mediaH / 2,
    size: Math.max(mediaW, mediaH),
    until: performance.now() + duration + 500
  });

  requestAnimationFrame(() => {
    el.style.opacity = '1';
    el.style.transform = `translate(${travelX}px, ${travelY}px) scale(${scale})`;
  });

  setTimeout(() => {
    el.style.opacity = '0';
  }, duration - 1800);

  setTimeout(() => {
    el.remove();
  }, duration + 120);
}

function startBurst() {
  if (burstStarted) return;
  burstStarted = true;
  burstEndAt = performance.now() + BURST_MS;

  spawnFloatingMedia();
  burstTimer = setInterval(() => {
    if (performance.now() >= burstEndAt) {
      clearInterval(burstTimer);
      burstTimer = null;
      burstStarted = false;
      return;
    }
    spawnFloatingMedia();
  }, BURST_INTERVAL_MS);
}

knob.addEventListener('pointerdown', e => {
  dragging = true;
  lastAngle = angleFromCenter(e, knob);
  knob.setPointerCapture(e.pointerId);
  startBurst();
});

knob.addEventListener('pointermove', async e => {
  if (!dragging) return;

  const a = angleFromCenter(e, knob);
  const d = fixDelta(a - lastAngle);
  lastAngle = a;

  if (Math.abs(d) < 0.2) return;

  rotation += d;
  knob.style.transform = `rotate(${rotation}deg)`;
  record.style.transform = `rotate(${rotation}deg)`;

  const absDelta = Math.abs(d);
  speedSmooth = speedSmooth * 0.85 + absDelta * 0.15;

  await ensurePlaying();

  const rate = clamp(0.85 + speedSmooth / 12, 0.85, 1.8);
  voice.playbackRate = rate;

  scheduleStop();
});

function stop() {
  dragging = false;
  clearTimeout(stopTimer);
  voice.pause();
  voice.playbackRate = 1;
  started = false;
  speedSmooth = 0;
  floatCooldown = 0;
}

knob.addEventListener('pointerup', stop);
knob.addEventListener('pointercancel', stop);
</script>

</body>
</html>
